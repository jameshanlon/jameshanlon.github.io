{%- macro render_article_item(article) %}
  <div class="article-info">
    <a href="/{{article.url}}" class="article-info-title text-decoration-none">
      {{article.title}}
    </a>
    <span class="article-tag small">
      {{article.date|strftime('%b %Y')}}
    </span>
    {% if article.summary %}
    <span class="article-summary">{{article.summary}}</span>
    {% endif %}
  </div>
{% endmacro %}
